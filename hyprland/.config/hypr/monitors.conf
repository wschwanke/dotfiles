# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)
env = GDK_SCALE,1

# Gigabyte M32U - bottom monitor (origin)
monitorv2 {
    output = desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768
    mode = 3840x2160@144
    position = 0x0
    scale = 1
}

# LG Ultra HD - top monitor (directly above Gigabyte)
monitorv2 {
    output = desc:LG Electronics LG Ultra HD 0x0006D9F6
    mode = 3840x2160@60
    position = 0x-2160
    scale = 1
}

# Laptop / fallback monitors
monitorv2 {
    output = eDP-1
    mode = preferred
    position = auto
    scale = 1
}

monitorv2 {
    output = HDMI-1
    mode = preferred
    position = auto
    scale = 1
}

# Catch-all for any other monitors
monitor = , preferred, auto, 1

# Workspace bindings - note the desc: prefix is required for description matching
workspace = 1, monitor:desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768,persistent:true
workspace = 2, monitor:desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768
workspace = 3, monitor:desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768
workspace = 4, monitor:desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768
workspace = 5, monitor:desc:GIGA-BYTE TECHNOLOGY CO. LTD. Gigabyte M32U 21451B000768
workspace = 6, monitor:desc:LG Electronics LG Ultra HD 0x0006D9F6,persistent:true
workspace = 7, monitor:desc:LG Electronics LG Ultra HD 0x0006D9F6
workspace = 8, monitor:desc:LG Electronics LG Ultra HD 0x0006D9F6
workspace = 9, monitor:desc:LG Electronics LG Ultra HD 0x0006D9F6
workspace = 10, monitor:desc:LG Electronics LG Ultra HD 0x0006D9F6
